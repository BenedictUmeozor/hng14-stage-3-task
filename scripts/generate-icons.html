<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate PWA Icons</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    canvas {
      border: 1px solid #ccc;
      margin: 10px;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
    }
    button:hover {
      background: #2563eb;
    }
    .instructions {
      background: #f3f4f6;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Generate PWA Icons</h1>
  
  <div class="instructions">
    <h2>Instructions:</h2>
    <ol>
      <li>Open this file in a web browser</li>
      <li>Click the "Download 192x192 Icon" button</li>
      <li>Save the file as <code>icon-192.png</code> in <code>public/icons/</code></li>
      <li>Click the "Download 512x512 Icon" button</li>
      <li>Save the file as <code>icon-512.png</code> in <code>public/icons/</code></li>
    </ol>
  </div>

  <div>
    <h2>Preview:</h2>
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
  </div>

  <div>
    <button onclick="downloadIcon(192)">Download 192x192 Icon</button>
    <button onclick="downloadIcon(512)">Download 512x512 Icon</button>
  </div>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      
      // Background with rounded corners
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size / 8);
      ctx.fill();
      
      // Draw checkmark in circle
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size * 0.31;
      
      // Circle
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = size * 0.047;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.stroke();
      
      // Checkmark
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = size * 0.0625;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      ctx.beginPath();
      ctx.moveTo(size * 0.3125, size * 0.5);
      ctx.lineTo(size * 0.4375, size * 0.625);
      ctx.lineTo(size * 0.6875, size * 0.375);
      ctx.stroke();
    }
    
    // Draw icons on page load
    drawIcon(document.getElementById('canvas192'));
    drawIcon(document.getElementById('canvas512'));
    
    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
